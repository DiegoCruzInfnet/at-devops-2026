# MISSÃO 2 - Cache Redis
# Namespace: ufology

# 1. Deployment do Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ufology
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379

---

# 2. Service do Redis
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ufology
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP
