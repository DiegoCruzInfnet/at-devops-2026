name: Run Monitor

on:
  push:
    branches:
      - main

# Variável no nível do workflow
env:
  DEPLOY_ENV: staging

jobs:
  monitor:
    runs-on: ubuntu-latest
    # Variável no nível do job
    env:
      JOB_NAME: monitor-job
    steps:
      # Variável no nível do step
      - name: Exibir variáveis em diferentes níveis
        env:
          STEP_INFO: "executando step de monitoramento"
        run: |
          echo "Nível workflow: $DEPLOY_ENV"
          echo "Nível job: $JOB_NAME"
          echo "Nível step: $STEP_INFO"

      - name: Usando GITHUB_TOKEN
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "GITHUB_TOKEN configurado e pronto para uso"

      - name: Usando secret API_KEY
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          if [ -n "$API_KEY" ]; then
            echo "API_KEY configurado"
          else
            echo "API_KEY não configurado"
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: monitor
    environment: producao
    env:
      PROD_DOMAIN: "ufotracker.producao.com"
    steps:
      - name: Deploy em produção
        run: |
          echo "Realizando deploy em $PROD_DOMAIN"