# ============================================
# PARTE 3 - Workflow 2: Secret
# Disparo: qualquer push
# ============================================

name: Secret Demo

on:
  push:

jobs:
  secret-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar secret configurado
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          if [ -n "$API_KEY" ]; then
            echo "API_KEY configurado"
          else
            echo "API_KEY não configurado"
          fi
