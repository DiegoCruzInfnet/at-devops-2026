name: Monitor e Debug

on:
  push:
    branches:
      - main

jobs:
  diagnostico:
    runs-on: ubuntu-latest
    steps:
      - name: Debug ativo
        env:
          ACTIONS_STEP_DEBUG: true
        run: echo "Debug ativado"

      - name: Mensagens de aviso e erro
        run: |
          echo "::warning::Atenção - verifique as configurações"
          echo "::error::Simulação de erro para teste"

      - name: Job Summary
        run: |
          echo "## Resumo da Execução" >> $GITHUB_STEP_SUMMARY
          echo "- Pipeline executado com sucesso!" >> $GITHUB_STEP_SUMMARY