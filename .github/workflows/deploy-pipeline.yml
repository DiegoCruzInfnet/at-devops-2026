name: Deploy Pipeline

on:
  push:
    branches:
      - main

env:
  DEPLOY_ENV: staging
  APP_NAME: ufo-tracker

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - name: Validar variáveis obrigatórias
        run: |
          if [ -z "$DEPLOY_ENV" ]; then
            echo "::error::DEPLOY_ENV não configurado!"
            exit 1
          fi
          if [ -z "$APP_NAME" ]; then
            echo "::error::APP_NAME não configurado!"
            exit 1
          fi
          echo "::notice::Variáveis validadas com sucesso!"

  testes:
    runs-on: ubuntu-latest
    needs: validar
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Executar testes
        run: |
          echo "::notice::Iniciando testes..."
          echo "Rodando testes da aplicação"
          echo "::notice::Testes concluídos com sucesso!"

  deploy:
    runs-on: ubuntu-latest
    needs: testes
    environment: producao
    steps:
      - name: Realizar deploy
        env:
          API_KEY: ${{ secrets.API_KEY }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Iniciando deploy de $APP_NAME"
          echo "Ambiente: $DEPLOY_ENV"
          echo "Deploy realizado com sucesso!"